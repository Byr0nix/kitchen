      apiKey: "AIzaSyABuq9wMzVHth5tuma40RNglCy_eamiYz0",
      authDomain: "salomatlik-bufeti.firebaseapp.com",
      projectId: "salomatlik-bufeti",
      storageBucket: "salomatlik-bufeti.firebasestorage.app",
      messagingSenderId: "717755457061",
      appId: "1:717755457061:web:7c754be46d9c779931a9cc"
    };

    // Импорт Firebase (используем совместимую версию)
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    // Инициализация
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);

    // DOM элементы
    const unauthenticatedDiv = document.getElementById('unauthenticated');
    const authenticatedDiv = document.getElementById('authenticated');
    const googleSignInBtn = document.getElementById('googleSignInBtn');
    const logoutBtn = document.getElementById('logoutUserBtn');
    const userNameSpan = document.getElementById('userName');
    const userAvatarImg = document.getElementById('userAvatar');
    const userSubscriptionSpan = document.getElementById('userSubscription');
    const welcomeTitle = document.getElementById('welcomeTitle');
    const welcomeText = document.getElementById('welcomeText');
    const productsGrid = document.getElementById('productsGrid');

    // Функция показа уведомлений
    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.className = `notification notification-${type}`;
      notification.textContent = message;
      document.body.appendChild(notification);
      setTimeout(() => notification.remove(), 3000);
    }

    // Функция входа через Google
    async function signInWithGoogle() {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        
        // Сохраняем/обновляем пользователя в Firestore
        const userRef = doc(db, 'users', user.uid);
        const userDoc = await getDoc(userRef);
        
        if (!userDoc.exists()) {
          // Новый пользователь
          await setDoc(userRef, {
            uid: user.uid,
            email: user.email,
            name: user.displayName,
            avatar: user.photoURL,
            subscriptionType: 'FREE',
            createdAt: new Date().toISOString(),
            lastLogin: new Date().toISOString()
          });
          showNotification(`Добро пожаловать, ${user.displayName || user.email}! Вы успешно зарегистрировались!`, 'success');
        } else {
          // Существующий пользователь
          await setDoc(userRef, {
            lastLogin: new Date().toISOString(),
            name: user.displayName,
            avatar: user.photoURL
          }, { merge: true });
          showNotification(`С возвращением, ${user.displayName || user.email}!`, 'success');
        }
        
        // Обновляем UI
        updateUserUI(user);
        
      } catch (error) {
        console.error('Ошибка входа:', error);
        showNotification('Ошибка входа: ' + error.message, 'error');
      }
    }

    // Функция выхода
    async function logoutUser() {
      try {
        await signOut(auth);
        showNotification('Вы вышли из аккаунта', 'info');
      } catch (error) {
        console.error('Ошибка выхода:', error);
        showNotification('Ошибка выхода: ' + error.message, 'error');
      }
    }

    // Обновление UI пользователя
    function updateUserUI(user) {
      userNameSpan.textContent = user.displayName || user.email.split('@')[0];
      userAvatarImg.src = user.photoURL || 'https://via.placeholder.com/36';
      unauthenticatedDiv.classList.add('hidden');
      authenticatedDiv.classList.remove('hidden');
      
      welcomeTitle.textContent = `Привет, ${user.displayName || 'пользователь'}!`;
      welcomeText.textContent = 'Рады видеть вас снова!';
    }

    // Сброс UI при выходе
    function resetUI() {
      unauthenticatedDiv.classList.remove('hidden');
      authenticatedDiv.classList.add('hidden');
      welcomeTitle.textContent = 'Добро пожаловать в Salomatlik Bufeti!';
      welcomeText.textContent = 'Натуральные продукты для здорового питания';
    }

    // Загрузка товаров (пример)
    async function loadProducts() {
      try {
        const productsRef = collection(db, 'products');
        const querySnapshot = await getDocs(productsRef);
        
        if (querySnapshot.empty) {
          productsGrid.innerHTML = '<div class="empty-state">Товары временно недоступны</div>';
          return;
        }
        
        const products = [];
        querySnapshot.forEach((doc) => {
          products.push({ id: doc.id, ...doc.data() });
        });
        
        displayProducts(products);
        
      } catch (error) {
        console.error('Ошибка загрузки товаров:', error);
        productsGrid.innerHTML = '<div class="empty-state">Не удалось загрузить товары</div>';
      }
    }

    // Отображение товаров
    function displayProducts(products) {
      if (products.length === 0) {
        productsGrid.innerHTML = '<div class="empty-state">Нет доступных товаров</div>';
        return;
      }
      
      productsGrid.innerHTML = products.map(product => `
        <div class="product-card">
          <img src="${product.image || 'https://via.placeholder.com/250x180'}" alt="${product.title}" class="product-image" onerror="this.src='https://via.placeholder.com/250x180'">
          <div class="product-info">
            <h3 class="product-title">${product.title}</h3>
            <p style="color: #666; font-size: 0.9rem; margin: 8px 0;">${product.description || ''}</p>
            <div class="product-price">${product.price || 0} UZS</div>
          </div>
        </div>
      `).join('');
    }

    // Отслеживание состояния авторизации
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        updateUserUI(user);
        
        // Получаем тип подписки пользователя
        try {
          const userRef = doc(db, 'users', user.uid);
          const userDoc = await getDoc(userRef);
          if (userDoc.exists()) {
            const subscriptionType = userDoc.data().subscriptionType || 'FREE';
            userSubscriptionSpan.textContent = subscriptionType;
          }
        } catch (error) {
          console.error('Ошибка получения подписки:', error);
        }
      } else {
        resetUI();
      }
    });

    // Обработчики событий
    googleSignInBtn.addEventListener('click', signInWithGoogle);
    logoutBtn.addEventListener('click', logoutUser);

    // Загружаем товары при старте
    loadProducts();
    
    // Проверка интернет соединения
    window.addEventListener('online', () => {
      showNotification('Интернет соединение восстановлено', 'success');
      loadProducts();
    });
    
    window.addEventListener('offline', () => {
      showNotification('Нет интернет соединения', 'error');
    });
  </script>
</body>
</html>
